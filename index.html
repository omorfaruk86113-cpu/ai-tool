<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Facebook Post Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #a68eff, #6e9aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .tab {
      background: #2a2a2a;
      border: none;
      color: #ccc;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab.active {
      background: #6e9aff;
      color: #fff;
    }

    .input-group {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    #topicInput {
      flex: 1;
      padding: 0.8rem 1rem;
      border-radius: 2rem;
      border: 1px solid #333;
      background: #2a2a2a;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    #topicInput:focus {
      border-color: #6e9aff;
    }

    #generateBtn {
      background: #6e9aff;
      border: none;
      color: #fff;
      padding: 0.8rem 1.8rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    #generateBtn:hover {
      background: #5a7de0;
    }

    #generateBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .output-area {
      display: none;
      margin-top: 2rem;
    }

    .image-wrapper {
      width: 100%;
      max-width: 400px;
      margin: 0 auto 1.5rem;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #333;
      position: relative;
    }

    #resultImage {
      width: 100%;
      height: auto;
      display: block;
    }

    .image-buttons {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .btn {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #3a3a3a;
    }

    .content-box {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .caption {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .quote {
      font-style: italic;
      color: #b8b8ff;
      font-size: 1.3rem;
      margin-bottom: 1rem;
      border-left: 3px solid #6e9aff;
      padding-left: 1rem;
    }

    .hashtags {
      color: #9acaff;
      word-break: break-all;
    }

    .copy-btn {
      margin-top: 0.5rem;
      background: #6e9aff;
      color: #fff;
      border: none;
    }

    .copy-btn:hover {
      background: #5a7de0;
    }

    .loader {
      border: 4px solid #2a2a2a;
      border-top: 4px solid #6e9aff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 2rem auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-msg {
      color: #ff6b6b;
      text-align: center;
      margin: 1rem 0;
      font-size: 0.9rem;
    }

    @media (max-width: 500px) {
      .input-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ AI Post Generator</h1>

    <!-- Brand Tabs -->
    <div class="brand-tabs">
      <button class="tab active" data-brand="meow">🐱 Meow</button>
      <button class="tab" data-brand="sad">😢 Sad</button>
      <button class="tab" data-brand="motivation">💪 Motivation</button>
    </div>

    <!-- Input & Generate -->
    <div class="input-group">
      <input type="text" id="topicInput" placeholder="Enter your topic..." />
      <button id="generateBtn">Generate</button>
    </div>

    <!-- Loading spinner (hidden by default) -->
    <div id="loader" class="loader" style="display: none;"></div>

    <!-- Output area (hidden until results) -->
    <div id="outputArea" class="output-area">
      <!-- Image + download -->
      <div class="image-wrapper">
        <img id="resultImage" src="" alt="AI generated image" />
      </div>
      <div class="image-buttons">
        <button id="downloadBtn" class="btn">⬇️ Download Image</button>
      </div>

      <!-- Text content -->
      <div class="content-box">
        <div class="caption" id="captionText"></div>
        <div class="quote" id="quoteText"></div>
        <div class="hashtags" id="hashtagsText"></div>
        <button id="copyBtn" class="btn copy-btn">📋 Copy All</button>
      </div>

      <!-- Error display -->
      <div id="errorMsg" class="error-msg"></div>
    </div>
  </div>

  <script>
    (function() {
      const topicInput = document.getElementById('topicInput');
      const generateBtn = document.getElementById('generateBtn');
      const loader = document.getElementById('loader');
      const outputArea = document.getElementById('outputArea');
      const resultImage = document.getElementById('resultImage');
      const downloadBtn = document.getElementById('downloadBtn');
      const captionText = document.getElementById('captionText');
      const quoteText = document.getElementById('quoteText');
      const hashtagsText = document.getElementById('hashtagsText');
      const copyBtn = document.getElementById('copyBtn');
      const errorMsg = document.getElementById('errorMsg');

      // Brand selection
      const tabs = document.querySelectorAll('.tab');
      let currentBrand = 'meow';

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentBrand = tab.dataset.brand;
        });
      });

      // Generate handler
      generateBtn.addEventListener('click', async () => {
        const topic = topicInput.value.trim();
        if (!topic) {
          alert('Please enter a topic.');
          return;
        }

        // Show loader, hide previous output
        loader.style.display = 'block';
        outputArea.style.display = 'none';
        errorMsg.textContent = '';
        generateBtn.disabled = true;

        try {
          const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topic, brand: currentBrand })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || 'Request failed');
          }

          // Populate text fields
          captionText.textContent = data.caption || '';
          quoteText.textContent = data.quote || '';
          hashtagsText.textContent = data.hashtags || '';

          // Handle image
          if (data.imageUrl) {
            resultImage.src = data.imageUrl;
            downloadBtn.style.display = 'inline-block';
          } else {
            resultImage.src = '';
            downloadBtn.style.display = 'none';
          }

          // Show any errors
          let errors = [];
          if (data.errors?.text) errors.push(data.errors.text);
          if (data.errors?.image) errors.push(data.errors.image);
          errorMsg.textContent = errors.join(' | ');

          // Reveal output
          outputArea.style.display = 'block';
        } catch (err) {
          errorMsg.textContent = err.message || 'Something went wrong.';
          outputArea.style.display = 'block';
          // Clear old content
          captionText.textContent = '';
          quoteText.textContent = '';
          hashtagsText.textContent = '';
          resultImage.src = '';
          downloadBtn.style.display = 'none';
        } finally {
          loader.style.display = 'none';
          generateBtn.disabled = false;
        }
      });

      // Copy all text
      copyBtn.addEventListener('click', () => {
        const fullText = `${captionText.textContent}\n\n"${quoteText.textContent}"\n\n${hashtagsText.textContent}`;
        navigator.clipboard.writeText(fullText).then(() => {
          copyBtn.textContent = '✅ Copied!';
          setTimeout(() => { copyBtn.textContent = '📋 Copy All'; }, 2000);
        });
      });

      // Download image (fetch → blob → save)
      downloadBtn.addEventListener('click', async () => {
        const url = resultImage.src;
        if (!url) {
          alert('No image to download.');
          return;
        }
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('Network error');
          const blob = await response.blob();
          const blobUrl = URL.createObjectURL(blob);

          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = `ai-image-${Date.now()}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(blobUrl);
        } catch (e) {
          alert('Download failed. Right-click the image and choose "Save image as...".');
        }
      });
    })();
  </script>
</body>
</html>
